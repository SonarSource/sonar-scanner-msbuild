name: Publish NuGet
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 10.1.0.12345)"
        required: true
        type: string
      dry-run:
        description: "Dry run: skip publish, show summary only"
        type: boolean
        default: false

jobs:
  publish-nuget:
    name: Publish to NuGet
    runs-on: sonar-xs
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Resolve package name
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          # Strip build number: 10.1.0.12345 -> 10.1.0
          NUGET_VERSION=$(echo "$RELEASE_VERSION" | sed 's/\.[^.]*$//')
          echo "PACKAGE_NAME=dotnet-sonarscanner.${NUGET_VERSION}.nupkg" >> "$GITHUB_ENV"

      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          tool_versions: |
            dotnet 10
            github-cli 2.92

      - name: Get secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/team/languages/kv/data/nuget nuget | NUGET_API_KEY;

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/artifacts"
          gh release download "$RELEASE_VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "$PACKAGE_NAME" \
            --dir "$RUNNER_TEMP/artifacts"

          if [ ! -f "$RUNNER_TEMP/artifacts/$PACKAGE_NAME" ]; then
            echo "::error::Package $PACKAGE_NAME not found in release $RELEASE_VERSION"
            exit 1
          fi

          echo "Downloaded: $PACKAGE_NAME"

      - name: Publish dotnet-sonarscanner to NuGet
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          NUGET_API_KEY: ${{ fromJSON(steps.secrets.outputs.vault).NUGET_API_KEY }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          ARTIFACTS_DIR: ${{ runner.temp }}/artifacts
        run: |
          echo "Publishing $PACKAGE_NAME to NuGet..."
          dotnet nuget push "${ARTIFACTS_DIR}/${PACKAGE_NAME}" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Summary
        if: ${{ inputs.dry-run }}
        shell: bash
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
        run: |
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The following package would have been published to NuGet:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${PACKAGE_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
