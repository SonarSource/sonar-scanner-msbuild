name: Automated Release
on:
  workflow_dispatch:
    inputs:
      pm-email:
        description: "Product manager email"
        required: true
        type: string
      short-description:
        description: "Short description for the REL ticket"
        required: true
        type: string
      branch:
        description: "Branch from which to do the release"
        required: true
        default: "master"
        type: string
      new-version:
        description: "New version to release (without -SNAPSHOT; if left empty, the current minor version will be auto-incremented)"
        required: false
        type: string
      verbose:
        description: "Enable verbose logging"
        type: boolean
        default: false
      dry-run:
        description: "Test mode: uses Jira sandbox and creates draft GitHub release"
        type: boolean
        default: false

jobs:
  release:
    name: Release
    uses: SonarSource/release-github-actions/.github/workflows/automated-release.yml@v1
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      project-name: "SonarScanner for .NET"
      plugin-name: "scanner-msbuild" # irrelevant for Scanner MSBuild but required
      jira-project-key: "SCAN4NET"
      slack-channel: "squad-dotnet-s4net"
      rule-props-changed: false
      sqc-integration: false
      sqs-integration: false
      pm-email: ${{ inputs.pm-email }}
      short-description: ${{ inputs.short-description }}
      branch: ${{ inputs.branch }}
      new-version: ${{ inputs.new-version }}
      verbose: ${{ inputs.verbose }}
      use-jira-sandbox: ${{ inputs.dry-run }}
      is-draft-release: ${{ inputs.dry-run }}

  publish-nuget:
    name: Publish NuGet
    needs: release
    uses: ./.github/workflows/PublishNuget.yml
    permissions:
      id-token: write
      contents: write
    with:
      version: ${{ needs.release.outputs.release-version }}
      dry-run: ${{ inputs.dry-run }}

  integrate-sonarcloud-scanner:
    needs: [release]
    runs-on: sonar-s
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Get Vault secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-release-automation token | GITHUB_TOKEN

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: SonarSource/sonarcloud-autoscan
          token: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN}}

      - name: Update SCANNER_DOTNET_VERSION
        env:
          VERSION: ${{ needs.release.outputs.release-version }}
        run: |
          sed -i "s/SCANNER_DOTNET_VERSION=\"[^\"]*\"/SCANNER_DOTNET_VERSION=\"${VERSION}\"/" worker-for-dotnet/docker/download_prerequisites.sh

      - name: Create Pull Request
        uses: SonarSource/release-github-actions/create-pull-request@v1
        with:
          branch: integrate/dotnet-scanner-${{ needs.release.outputs.release-version }}
          base: master
          title: "Bump SonarScanner for .NET to ${{ needs.release.outputs.release-version }}"
          commit-message: "Bump SonarScanner for .NET to ${{ needs.release.outputs.release-version }}"
          reviewers: ${{ github.actor }}
          draft: true
