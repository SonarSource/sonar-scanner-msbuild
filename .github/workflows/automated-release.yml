name: Automated Release
on:
  workflow_dispatch:
    inputs:
      pm-email:
        description: "Product manager email"
        required: true
        type: string
      short-description:
        description: "Short description for the REL ticket"
        required: true
        type: string
      branch:
        description: "Branch from which to do the release"
        required: true
        default: "master"
        type: string
      new-version:
        description: "New version to release (without -SNAPSHOT; if left empty, the current minor version will be auto-incremented)"
        required: false
        type: string
      verbose:
        description: "Enable verbose logging"
        type: boolean
        default: false
      dry-run:
        description: "Test mode: uses Jira sandbox and creates draft GitHub release"
        type: boolean
        default: false

jobs:
  lock-branch:
    name: Lock branch
    runs-on: sonar-xs
    permissions:
      id-token: write
    steps:
      - id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-lock token | lock_token;
            development/kv/data/slack token | slack_api_token;
      - uses: sonarsource/gh-action-lt-backlog/LockBranch@v2
        with:
          github-token: ${{ fromJSON(steps.secrets.outputs.vault).lock_token }}
          slack-token: ${{ fromJSON(steps.secrets.outputs.vault).slack_api_token }}
          slack-channel: squad-corelang-releases
          branch-pattern: ${{ inputs.branch }}
          lock-branch: true
  release:
    name: Release
    uses: SonarSource/release-github-actions/.github/workflows/automated-release.yml@v1
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      project-name: "SonarScanner for .NET"
      plugin-name: "scanner-msbuild" # irrelevant for Scanner MSBuild but required
      jira-project-key: "SCAN4NET"
      slack-channel: "squad-corelang-releases"
      release-artifacts-private: |
        sonarsource-public-builds/org/sonarsource/scanner/msbuild/sonar-scanner/{version}/sonar-scanner-{version}-net-framework.zip
        sonarsource-public-builds/org/sonarsource/scanner/msbuild/sonar-scanner/{version}/sonar-scanner-{version}-net.zip
        sonarsource-public-builds/org/sonarsource/scanner/msbuild/sonar-scanner/{version}/sonar-scanner-{version}.nupkg
      rule-props-changed: false
      sqc-integration: false
      sqs-integration: false
      bump-version: false
      freeze-branch: false
      pm-email: ${{ inputs.pm-email }}
      short-description: ${{ inputs.short-description }}
      branch: ${{ inputs.branch }}
      new-version: ${{ inputs.new-version }}
      verbose: ${{ inputs.verbose }}
      use-jira-sandbox: ${{ inputs.dry-run }}
      is-draft-release: ${{ inputs.dry-run }}

  unlock-branch:
    name: Unlock branch
    runs-on: sonar-xs
    needs: release
    if: ${{ needs.release.result == 'success' }}
    permissions:
      id-token: write
    steps:
      - id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-lock token | lock_token;
            development/kv/data/slack token | slack_api_token;
      - uses: sonarsource/gh-action-lt-backlog/LockBranch@v2
        with:
          github-token: ${{ fromJSON(steps.secrets.outputs.vault).lock_token }}
          slack-token: ${{ fromJSON(steps.secrets.outputs.vault).slack_api_token }}
          slack-channel: squad-corelang-releases
          branch-pattern: ${{ inputs.branch }}
          lock-branch: false

  publish-nuget:
    name: Publish NuGet
    needs: release
    uses: ./.github/workflows/PublishNuget.yml
    permissions:
      id-token: write
      contents: write
    with:
      version: ${{ needs.release.outputs.release-version }}
      dry-run: ${{ inputs.dry-run }}

  publish-chocolatey:
    name: Publish Chocolatey
    needs: release
    uses: ./.github/workflows/PublishChocolatey.yml
    permissions:
      id-token: write
    with:
      version: ${{ needs.release.outputs.release-version }}
      dry-run: ${{ inputs.dry-run }}

  bump-version:
    name: Bump version
    needs: [release]
    if: ${{ inputs.dry-run == false }}
    runs-on: sonar-s
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            powershell-core 7.6.1
            dotnet 10

      - name: Normalize version to X.Y.Z
        id: normalize
        shell: pwsh
        env:
          NEW_VERSION: ${{ needs.release.outputs.new-version }}
        run: |
          $v = $env:NEW_VERSION
          if ($v -match '^\d+\.\d+$') { $v = "$v.0" }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run version bump script
        shell: pwsh
        env:
          NEW_VERSION: ${{ steps.normalize.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/set-version.ps1 -Version $env:NEW_VERSION
  
  integrate-sonarcloud-scanner:
    needs: [release]
    runs-on: sonar-s
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Get Vault secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/{REPO_OWNER_NAME_DASH}-release-automation token | GITHUB_TOKEN

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: SonarSource/sonarcloud-autoscan
          token: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN}}

      - name: Update SCANNER_DOTNET_VERSION
        env:
          VERSION: ${{ needs.release.outputs.release-version }}
        run: |
          sed -i "s/SCANNER_DOTNET_VERSION=\"[^\"]*\"/SCANNER_DOTNET_VERSION=\"${VERSION}\"/" worker-for-dotnet/docker/download_prerequisites.sh

      - name: Create Pull Request
        uses: SonarSource/release-github-actions/create-pull-request@v1
        with:
          branch: integrate/dotnet-scanner-${{ needs.release.outputs.release-version }}
          base: master
          title: "Bump SonarScanner for .NET to ${{ needs.release.outputs.release-version }}"
          commit-message: "Bump SonarScanner for .NET to ${{ needs.release.outputs.release-version }}"
          reviewers: ${{ github.actor }}
          draft: true
