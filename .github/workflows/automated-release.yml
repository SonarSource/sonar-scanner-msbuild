name: Automated Release
on:
  workflow_dispatch:
    inputs:
      pm-email:
        description: "Product manager email"
        required: true
        type: string
      short-description:
        description: "Short description for the REL ticket"
        required: true
        type: string
      branch:
        description: "Branch from which to do the release"
        required: true
        default: "master"
        type: string
      new-version:
        description: "New version to release (without -SNAPSHOT; if left empty, the current minor version will be auto-incremented)"
        required: false
        type: string
      verbose:
        description: "Enable verbose logging"
        type: boolean
        default: false
      dry-run:
        description: "Test mode: uses Jira sandbox and creates draft GitHub release"
        type: boolean
        default: false

jobs:
  release:
    name: Release
    uses: SonarSource/release-github-actions/.github/workflows/automated-release.yml@v1
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      project-name: "SonarScanner for .NET"
      plugin-name: "scanner-msbuild" # irrelevant for Scanner MSBuild but required
      jira-project-key: "SCAN4NET"
      slack-channel: "squad-dotnet-s4net"
      rule-props-changed: false
      sqc-integration: false
      sqs-integration: false
      pm-email: ${{ inputs.pm-email }}
      short-description: ${{ inputs.short-description }}
      branch: ${{ inputs.branch }}
      new-version: ${{ inputs.new-version }}
      verbose: ${{ inputs.verbose }}
      use-jira-sandbox: ${{ inputs.dry-run }}
      is-draft-release: ${{ inputs.dry-run }}

  publish-nuget:
    name: Publish NuGet
    needs: release
    uses: ./.github/workflows/PublishNuget.yml
    permissions:
      id-token: write
      contents: write
    with:
      version: ${{ needs.release.outputs.release-version }}
      dry-run: ${{ inputs.dry-run }}
