name: Automated Release
on:
  workflow_dispatch:
    inputs:
      pm-email:
        description: "Product manager email"
        required: true
        type: string
      short-description:
        description: "Short description for the REL ticket"
        required: true
        type: string
      branch:
        description: "Branch from which to do the release"
        required: true
        default: "master"
        type: string
      new-version:
        description: "New version to release (without -SNAPSHOT; if left empty, the current minor version will be auto-incremented)"
        required: false
        type: string
      verbose:
        description: "Enable verbose logging"
        type: boolean
        default: false
      dry-run:
        description: "Test mode: uses Jira sandbox and creates draft GitHub release"
        type: boolean
        default: false

jobs:
  release:
    name: Release
    uses: SonarSource/release-github-actions/.github/workflows/automated-release.yml@v1
    permissions:
      statuses: read
      id-token: write
      contents: write
      actions: write
      pull-requests: write
    with:
      project-name: "SonarScanner for .NET"
      plugin-name: "scanner-msbuild" # irrelevant for Scanner MSBuild but required
      jira-project-key: "SCAN4NET"
      slack-channel: "squad-dotnet-s4net"
      rule-props-changed: false
      sqc-integration: false
      sqs-integration: false
      bump-version: false
      freeze-branch: true
      pm-email: ${{ inputs.pm-email }}
      short-description: ${{ inputs.short-description }}
      branch: ${{ inputs.branch }}
      new-version: ${{ inputs.new-version }}
      verbose: ${{ inputs.verbose }}
      use-jira-sandbox: ${{ inputs.dry-run }}
      is-draft-release: ${{ inputs.dry-run }}

  publish-nuget:
    name: Publish NuGet
    needs: release
    uses: ./.github/workflows/PublishNuget.yml
    permissions:
      id-token: write
      contents: write
    with:
      version: ${{ needs.release.outputs.release-version }}
      dry-run: ${{ inputs.dry-run }}

  bump-version:
    name: Bump version
    needs: [release]
    if: ${{ inputs.dry-run == false }}
    runs-on: sonar-s
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          tool_versions: |
            powershell-core 7.6.1
            dotnet 10

      - name: Normalize version to X.Y.Z
        id: normalize
        shell: pwsh
        env:
          NEW_VERSION: ${{ needs.release.outputs.new-version }}
        run: |
          $v = $env:NEW_VERSION
          if ($v -match '^\d+\.\d+$') { $v = "$v.0" }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run version bump script
        shell: pwsh
        env:
          NEW_VERSION: ${{ steps.normalize.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/set-version.ps1 -Version $env:NEW_VERSION
