name: CI

on:
  push:
    branches: [master, 'branch-*', 'feature/*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

env:
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  version:
    name: Compute version
    runs-on: sonar-xs
    permissions:
      id-token: write
    outputs:
      BUILD_NUMBER: ${{ steps.get-build-number.outputs.BUILD_NUMBER }}
      SHORT_VERSION: ${{ steps.set-version.outputs.SHORT_VERSION }}
      FULL_VERSION: ${{ steps.set-version.outputs.FULL_VERSION }}
      PATCH_VERSION: ${{ steps.set-version.outputs.PATCH_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Get build number
        uses: SonarSource/ci-github-actions/get-build-number@v1
        id: get-build-number

      - name: Set version
        id: set-version
        shell: bash
        run: |
          SHORT_VERSION=$(python3 -c "import xml.etree.ElementTree as ET; print(ET.parse('Version.targets').getroot().find('.//ShortVersion').text.strip())")
          if [ "$(echo "$SHORT_VERSION" | tr -cd '.' | wc -c)" -eq 1 ]; then
            PATCH_VERSION="$SHORT_VERSION.0"
          else
            PATCH_VERSION="$SHORT_VERSION"
          fi
          FULL_VERSION="$PATCH_VERSION.${{ steps.get-build-number.outputs.BUILD_NUMBER }}"
          echo "SHORT_VERSION=$SHORT_VERSION" >> "$GITHUB_OUTPUT"
          echo "PATCH_VERSION=$PATCH_VERSION" >> "$GITHUB_OUTPUT"
          echo "FULL_VERSION=$FULL_VERSION"   >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: version
    runs-on: warp-custom-dotnet-bubble-ci
    permissions:
      id-token: write
      contents: read
    env:
      BUILD_NUMBER: ${{ needs.version.outputs.BUILD_NUMBER }}
      SHORT_VERSION: ${{ needs.version.outputs.SHORT_VERSION }}
      FULL_VERSION: ${{ needs.version.outputs.FULL_VERSION }}
      PATCH_VERSION: ${{ needs.version.outputs.PATCH_VERSION }}
      PACKAGING_BINARIES: Packaging/Binaries
      PACKAGING_BINARIES_NET: Packaging/Binaries/Net
      PACKAGING_BINARIES_NET_FRAMEWORK: Packaging/Binaries/Net-Framework
      PACKAGING_BINARIES_NUGET: Packaging/Binaries/NuGet
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Prepare
        id: prepare
        uses: ./.github/actions/prepare
        with:
          nuget-packages-path: ${{ env.NUGET_PACKAGES }}
          build-number: ${{ env.BUILD_NUMBER }}
          short-version: ${{ env.SHORT_VERSION }}

      - name: Generate SBOM
        run: dotnet CycloneDX SonarScanner.MSBuild.sln -t --json -o $env:PACKAGING_BINARIES

      - name: Build
        run: dotnet build SonarScanner.MSBuild.sln --no-restore -c Release /m

      - name: Sign DLLs
        uses: SonarSource/gh-action_azure-artifact-signing@v1
        with:
          files: |
            ${{ env.PACKAGING_BINARIES_NET }}/Sonar*.dll
            ${{ env.PACKAGING_BINARIES_NET }}/Sonar*.exe
            ${{ env.PACKAGING_BINARIES_NET_FRAMEWORK }}/Sonar*.dll
            ${{ env.PACKAGING_BINARIES_NET_FRAMEWORK }}/Sonar*.exe

      - name: Zip .NET packages
        run: |
          function Zip-Assemblies([string]$Source, [string]$Destination) {
              # Don't use Compress-Archive because https://github.com/SonarSource/sonar-scanner-msbuild/issues/2086
              tar -c -a -C "$Source" --options "zip:compression-level=9" -f "$Destination" *
          }

          Zip-Assemblies "$env:PACKAGING_BINARIES_NET" "$env:PACKAGING_BINARIES/sonar-scanner-$env:FULL_VERSION-net.zip"
          Zip-Assemblies "$env:PACKAGING_BINARIES_NET_FRAMEWORK" "$env:PACKAGING_BINARIES/sonar-scanner-$env:FULL_VERSION-net-framework.zip"

      - name: Package dotnet global tool
        run: nuget pack Packaging\NuGet\dotnet-sonarscanner.nuspec -Version $env:PATCH_VERSION -OutputDirectory $env:PACKAGING_BINARIES_NUGET

      - name: Generate Choco packages
        run: . .\scripts\create-choco-packages.ps1

      # Azure Trusted Signing can't be used here: NuGet.org requires a registered certificate
      # thumbprint, but Azure Trusted Signing certs rotate too often (~72h) to register one.
      # https://github.com/NuGet/NuGetGallery/issues/10027
      - name: Sign NuGet package
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/branch-')
        uses: ./.github/actions/sign-nuget-package
        with:
          package-path: ${{ env.PACKAGING_BINARIES_NUGET }}/dotnet-sonarscanner*.nupkg

      - name: Run packaging tests
        env:
          IS_RELEASE_BRANCH: ${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/branch-') }}
        run: dotnet test Tests\SonarScanner.MSBuild.PackagingTest\SonarScanner.MSBuild.PackagingTest.csproj --configuration Release --no-build --no-restore

      - name: Set Maven project version
        shell: bash
        env:
          SHORT_VERSION: ${{ needs.version.outputs.SHORT_VERSION }}
          FULL_VERSION: ${{ needs.version.outputs.FULL_VERSION }}
        run: |
          echo "CURRENT_VERSION=$SHORT_VERSION" >> "$GITHUB_ENV"
          echo "PROJECT_VERSION=$FULL_VERSION" >> "$GITHUB_ENV"

      - name: Stage to repox
        uses: SonarSource/ci-github-actions/build-maven@v1
        with:
          deploy-pull-request: true
          sonar-platform: none

      - name: Upload binaries as pipeline artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Binaries
          path: ${{ env.PACKAGING_BINARIES }}
          retention-days: 1
          if-no-files-found: error

  qa_windows:
    name: QA Windows - UTs and analysis
    needs: version
    runs-on: warp-custom-dotnet-bubble-ci
    permissions:
      id-token: write
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          nuget-packages-path: ${{ env.NUGET_PACKAGES }}
          build-number: ${{ needs.version.outputs.BUILD_NUMBER }}
          short-version: ${{ needs.version.outputs.SHORT_VERSION }}

      - name: Fetch Vault Secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader username     | REPOX_USER;
            development/artifactory/token/{REPO_OWNER_NAME_DASH}-private-reader access_token | REPOX_TOKEN;
            development/kv/data/sonarcloud token                                             | SONAR_TOKEN;

      - name: Cache SonarScanner for .NET
        id: s4net-cache
        uses: SonarSource/gh-action_cache@v1
        with:
          path: ${{ env.NUGET_PACKAGES }}\dotnet-sonarscanner
          key: s4net-${{ hashFiles('.config/dotnet-tools.json') }}

      - name: Restore SonarScanner for .NET
        env:
          ARTIFACTORY_USER:     ${{ fromJSON(steps.secrets.outputs.vault).REPOX_USER }}
          ARTIFACTORY_PASSWORD: ${{ fromJSON(steps.secrets.outputs.vault).REPOX_TOKEN }}
        run: dotnet tool restore --tool-manifest .config/dotnet-tools.json --configfile "NuGet.Config"

      - name: SonarQube Analysis begin
        env:
          SONAR_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).SONAR_TOKEN }}
        run: >
          dotnet tool run dotnet-sonarscanner -- begin
          /o:"sonarsource"
          /k:"sonarscanner-msbuild"
          /v:"${{ needs.version.outputs.SHORT_VERSION }}"
          /d:sonar.token="$env:SONAR_TOKEN"
          /d:sonar.cs.opencover.reportsPaths="${{ github.workspace }}\Coverage\*.xml"
          /d:sonar.cs.vstest.reportsPaths="${{ github.workspace }}\TestResults\*.trx"
          /d:sonar.sca.exclusions="its/projects/**"

      - name: Build and analyze
        run: dotnet build SonarScanner.MSBuild.sln --no-restore -c Release /p:RunAnalyzers=true /p:RunAnalyzersDuringBuild=true

      - name: Run UTs and compute coverage
        env:
          ARTIFACTORY_USER:     ${{ fromJSON(steps.secrets.outputs.vault).REPOX_USER }}
          ARTIFACTORY_PASSWORD: ${{ fromJSON(steps.secrets.outputs.vault).REPOX_TOKEN }}
        run: .\scripts\run-unit-tests.ps1 -SourcesDirectory "${{ github.workspace }}" -BuildConfiguration Release

      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: Unit Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Delete files created by unit tests
        run: |
          Get-ChildItem "${{ runner.temp }}" -Filter 'dummy.*' -Recurse -Attributes !Directory | Remove-Item

      - name: SonarQube Analysis end
        env:
          SONAR_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).SONAR_TOKEN }}
        run: dotnet tool run dotnet-sonarscanner -- end /d:sonar.token="$env:SONAR_TOKEN"
