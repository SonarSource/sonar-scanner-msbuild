name: Publish Chocolatey
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 10.1.0.12345)"
        required: true
        type: string
      dry-run:
        description: "Dry run: skip publish, show summary only"
        type: boolean
        default: false

jobs:
  publish-chocolatey:
    name: Publish to Chocolatey
    runs-on: sonar-xs
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Resolve package names
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          echo "FRAMEWORK_PACKAGE=sonar-scanner-${RELEASE_VERSION}-net-framework.nupkg" >> "$GITHUB_ENV"
          echo "NET_PACKAGE=sonar-scanner-${RELEASE_VERSION}-net.nupkg" >> "$GITHUB_ENV"

      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
          tool_versions: |
            github-cli 2.92

      - name: Get secrets
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/team/languages/kv/data/chocolatey choco_api_key | CHOCO_API_KEY;

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          FRAMEWORK_PACKAGE: ${{ env.FRAMEWORK_PACKAGE }}
          NET_PACKAGE: ${{ env.NET_PACKAGE }}
          PACKAGES_DIR: ${{ runner.temp }}/packages
        shell: bash
        run: |
          mkdir -p "$PACKAGES_DIR"
          gh release download "$RELEASE_VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "$FRAMEWORK_PACKAGE" \
            --pattern "$NET_PACKAGE" \
            --dir "$PACKAGES_DIR"

          if [ ! -f "$PACKAGES_DIR/$FRAMEWORK_PACKAGE" ]; then
            echo "::error::Package $FRAMEWORK_PACKAGE not found in release $RELEASE_VERSION"
            exit 1
          fi
          if [ ! -f "$PACKAGES_DIR/$NET_PACKAGE" ]; then
            echo "::error::Package $NET_PACKAGE not found in release $RELEASE_VERSION"
            exit 1
          fi

          echo "Downloaded: $FRAMEWORK_PACKAGE, $NET_PACKAGE"

      - name: Publish .NET Framework package to Chocolatey
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          CHOCO_API_KEY: ${{ fromJSON(steps.secrets.outputs.vault).CHOCO_API_KEY }}
          FRAMEWORK_PACKAGE: ${{ env.FRAMEWORK_PACKAGE }}
          PACKAGES_DIR: ${{ runner.temp }}/packages
        run: |
          echo "Publishing $FRAMEWORK_PACKAGE..."
          choco apikey --key "$CHOCO_API_KEY" --source https://push.chocolatey.org/
          choco push "${PACKAGES_DIR}/${FRAMEWORK_PACKAGE}" \
            --source='https://push.chocolatey.org/' --yes --verbose --debug

      - name: Publish .NET package to Chocolatey
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          CHOCO_API_KEY: ${{ fromJSON(steps.secrets.outputs.vault).CHOCO_API_KEY }}
          NET_PACKAGE: ${{ env.NET_PACKAGE }}
          PACKAGES_DIR: ${{ runner.temp }}/packages
        run: |
          echo "Publishing $NET_PACKAGE..."
          choco apikey --key "$CHOCO_API_KEY" --source https://push.chocolatey.org/
          choco push "${PACKAGES_DIR}/${NET_PACKAGE}" \
            --source='https://push.chocolatey.org/' --yes --verbose --debug

      - name: Summary
        if: ${{ inputs.dry-run }}
        shell: bash
        env:
          FRAMEWORK_PACKAGE: ${{ env.FRAMEWORK_PACKAGE }}
          NET_PACKAGE: ${{ env.NET_PACKAGE }}
        run: |
          echo "## Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The following packages would have been published to Chocolatey:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${FRAMEWORK_PACKAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${NET_PACKAGE}\`" >> "$GITHUB_STEP_SUMMARY"
